<text x="880" y="241" font-size="11.5" fill="#3a2f25">8. Kaivo — well</text>
<text x="880" y="258" font-size="11.5" fill="#3a2f25">9. Kasvimaa — vegetable garden — 10×8 m</text>
<text x="880" y="275" font-size="11.5" fill="#3a2f25">10. Humalatarha — hop garden — 5×4 m</text>
<text x="880" y="292" font-size="11.5" fill="#3a2f25">11. Laituri — jetty</text>
