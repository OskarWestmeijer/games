<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" style="width: 100%; height: 100%; display: block; background: #0d0a07;">
  <defs>
    
    <linearGradient id="floor-grad" x1="0" y1="1080" x2="0" y2="620">
      <stop offset="0" stop-color="#352716"></stop>
      <stop offset="1" stop-color="#19120b"></stop>
    </linearGradient>
    
    <linearGradient id="back-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#201810"></stop>
      <stop offset="1" stop-color="#2a2014"></stop>
    </linearGradient>
    
    <linearGradient id="left-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4a3a25"></stop>
      <stop offset="1" stop-color="#211810"></stop>
    </linearGradient>
    
    <linearGradient id="right-grad" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0" stop-color="#332817"></stop>
      <stop offset="1" stop-color="#1a130c"></stop>
    </linearGradient>
    
    <linearGradient id="ceil-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e0a07"></stop>
      <stop offset="1" stop-color="#161009"></stop>
    </linearGradient>
    
    <radialGradient id="daylight" cx="0.5" cy="0.95" r="0.6">
      <stop offset="0" stop-color="#b8c6d2" stop-opacity="0.15"></stop>
      <stop offset="0.7" stop-color="#0d0a07" stop-opacity="0"></stop>
    </radialGradient>
    
    <linearGradient id="backglow" x1="0" y1="720" x2="0" y2="560">
      <stop offset="0" stop-color="#d4e1ea" stop-opacity="0.6"></stop>
      <stop offset="1" stop-color="#9fb2c2" stop-opacity="0"></stop>
    </linearGradient>
    
    <linearGradient id="shaft" x1="0" y1="1080" x2="0" y2="720">
      <stop offset="0" stop-color="#eef4f8" stop-opacity="1"></stop>
      <stop offset="0.35" stop-color="#d4e1ea" stop-opacity="0.78"></stop>
      <stop offset="0.7" stop-color="#a4b6c5" stop-opacity="0.4"></stop>
      <stop offset="1" stop-color="#6b7b89" stop-opacity="0.1"></stop>
    </linearGradient>
    <clipPath id="floor-clip">
      <polygon points="0,1080 640,720 1280,720 1920,1080"></polygon>
    </clipPath>
  </defs>

  

  
  <polygon points="0,0 1920,0 1280,300 640,300" fill="url(#ceil-grad)"></polygon>
  
  <line x1="0" y1="0" x2="700" y2="300" stroke="#1a140d" stroke-width="4" opacity="0.6"></line>
  <line x1="480" y1="0" x2="800" y2="300" stroke="#1a140d" stroke-width="4" opacity="0.6"></line>
  <line x1="960" y1="0" x2="960" y2="300" stroke="#1a140d" stroke-width="4" opacity="0.6"></line>
  <line x1="1440" y1="0" x2="1120" y2="300" stroke="#1a140d" stroke-width="4" opacity="0.6"></line>
  <line x1="1920" y1="0" x2="1220" y2="300" stroke="#1a140d" stroke-width="4" opacity="0.6"></line>

  
  <polygon points="0,0 640,300 640,720 0,1080" fill="url(#left-grad)"></polygon>
  
