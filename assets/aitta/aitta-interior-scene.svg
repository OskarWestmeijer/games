  <line x1="0" y1="1080" x2="640" y2="667" stroke="#241a10" stroke-width="5" opacity="0.7"></line>

  
  <polygon points="1920,0 1280,300 1280,720 1920,1080" fill="url(#right-grad)"></polygon>
  
  <line x1="1920" y1="150" x2="1280" y2="353" stroke="#1a120a" stroke-width="5" opacity="0.7"></line>
  <line x1="1920" y1="300" x2="1280" y2="405" stroke="#1a120a" stroke-width="5" opacity="0.7"></line>
  <line x1="1920" y1="450" x2="1280" y2="458" stroke="#1a120a" stroke-width="5" opacity="0.7"></line>
  <line x1="1920" y1="600" x2="1280" y2="510" stroke="#1a120a" stroke-width="5" opacity="0.7"></line>
  <line x1="1920" y1="760" x2="1280" y2="562" stroke="#1a120a" stroke-width="5" opacity="0.7"></line>
  <line x1="1920" y1="920" x2="1280" y2="615" stroke="#1a120a" stroke-width="5" opacity="0.7"></line>
  <line x1="1920" y1="1080" x2="1280" y2="667" stroke="#1a120a" stroke-width="5" opacity="0.7"></line>

  
  <polygon points="0,1080 640,720 1280,720 1920,1080" fill="url(#floor-grad)"></polygon>
  
