  <line x1="274" y1="1080" x2="707" y2="720" stroke="#241a10" stroke-width="5" opacity="0.5"></line>
  <line x1="549" y1="1080" x2="809" y2="720" stroke="#241a10" stroke-width="5" opacity="0.5"></line>
  <line x1="823" y1="1080" x2="910" y2="720" stroke="#241a10" stroke-width="5" opacity="0.5"></line>
  <line x1="1097" y1="1080" x2="1010" y2="720" stroke="#241a10" stroke-width="5" opacity="0.5"></line>
  <line x1="1371" y1="1080" x2="1111" y2="720" stroke="#241a10" stroke-width="5" opacity="0.5"></line>
  <line x1="1646" y1="1080" x2="1213" y2="720" stroke="#241a10" stroke-width="5" opacity="0.5"></line>
  <line x1="1920" y1="1080" x2="1280" y2="720" stroke="#241a10" stroke-width="5" opacity="0.5"></line>
  
  <line x1="438" y1="930" x2="1482" y2="930" stroke="#241a10" stroke-width="4" opacity="0.4"></line>
  <line x1="560" y1="822" x2="1360" y2="822" stroke="#241a10" stroke-width="3.5" opacity="0.38"></line>
  <line x1="620" y1="763" x2="1300" y2="763" stroke="#241a10" stroke-width="3" opacity="0.35"></line>

  
  <rect x="640" y="300" width="640" height="420" fill="url(#back-grad)"></rect>
  
  <line x1="640" y1="353" x2="1280" y2="353" stroke="#241a10" stroke-width="5" opacity="0.65"></line>
  <line x1="640" y1="405" x2="1280" y2="405" stroke="#241a10" stroke-width="5" opacity="0.65"></line>
  <line x1="640" y1="458" x2="1280" y2="458" stroke="#241a10" stroke-width="5" opacity="0.65"></line>
  <line x1="640" y1="510" x2="1280" y2="510" stroke="#241a10" stroke-width="5" opacity="0.65"></line>
  <line x1="640" y1="562" x2="1280" y2="562" stroke="#241a10" stroke-width="5" opacity="0.65"></line>
  <line x1="640" y1="615" x2="1280" y2="615" stroke="#241a10" stroke-width="5" opacity="0.65"></line>
  <line x1="640" y1="667" x2="1280" y2="667" stroke="#241a10" stroke-width="5" opacity="0.65"></line>

  
  <line x1="640" y1="300" x2="0" y2="0" stroke="#1a120a" stroke-width="3" opacity="0.5"></line>
  <line x1="1280" y1="300" x2="1920" y2="0" stroke="#1a120a" stroke-width="3" opacity="0.5"></line>
  <line x1="640" y1="720" x2="0" y2="1080" stroke="#1a120a" stroke-width="3" opacity="0.5"></line>
  <line x1="1280" y1="720" x2="1920" y2="1080" stroke="#1a120a" stroke-width="3" opacity="0.5"></line>
  <rect x="640" y="300" width="640" height="420" fill="none" stroke="#1a120a" stroke-width="3" opacity="0.5"></rect>

  
  <g clip-path="url(#floor-clip)">
    <polygon points="528,1080 1392,1080 1260,720 660,720" fill="url(#shaft)"></polygon>
  </g>
  
  <polygon points="660,720 1260,720 1230,560 690,560" fill="url(#backglow)"></polygon>

  
  <rect width="1920" height="1080" fill="url(#daylight)"></rect>
